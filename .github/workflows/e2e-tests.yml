name: E2E Tests

# main への push と main への PR で起動する。
# 開発ブランチへの push は対象外 (v1 スコープを最小化)。
# 文書のみの変更 (docs/, **.md, .gitignore) はテスト結果に影響しないため対象外。
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'

jobs:
  e2e-tests:
    name: E2E テスト (Playwright + Chromium)
    runs-on: ubuntu-latest
    # 通常は npm ci + Chromium DL + テスト実行で 5〜8 分。
    # キャッシュヒット時は Chromium DL が省略されてさらに短縮される。
    # timeout-minutes は CDN ハング時のフェイルセーフ天井 (リトライ込みでも収まる値)。
    timeout-minutes: 20

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        # Node 24.x = Active LTS (2025-10 昇格 / サポート期限 2028-04-30)
        # cache: 'npm' は package-lock.json をハッシュキーとして node_modules 解決を高速化する。
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 依存パッケージをインストール
        # npm install ではなく npm ci を使用する理由:
        # - package-lock.json に基づき完全に決定論的にインストールされる
        # - lock ファイル自体を書き換えない (CI 上で予期せぬ差分が出ない)
        # - 既存の node_modules を一旦削除するため、キャッシュ汚染にも強い
        run: npm ci

      - name: Playwright ブラウザのキャッシュ
        # ~/.cache/ms-playwright をキャッシュして Chromium (170 MiB) の再ダウンロードを回避する。
        # キーは package-lock.json のハッシュ → 同一 Playwright バージョン間で再利用される。
        # 同一バージョンでキャッシュヒット時、次ステップの browser install は丸ごとスキップされる。
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Playwright ブラウザをインストール (キャッシュミス時)
        # cdn.playwright.dev からの DL/展開がまれにハングする既知問題への対応:
        # - GNU `timeout` で 5 分のフェイルファストを設定し、ハング時は即座に再試行する。
        # - 最大 3 回まで再試行 (合計最悪 15 分、ジョブ timeout 20 分内に収まる)。
        # - `--with-deps` は使わない。apt 操作は次ステップで `install-deps` として分離した。
        #   分離する理由: ブラウザのみをキャッシュ対象にできる (apt 結果は OS 側で保持されない) ため。
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            echo "::group::Attempt ${attempt}: npx playwright install chromium"
            if timeout 300 npx playwright install chromium; then
              echo "::endgroup::"
              echo "Browser install succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "::endgroup::"
            if [ "${attempt}" -eq 3 ]; then
              echo "Browser install failed after 3 attempts"
              exit 1
            fi
            echo "Attempt ${attempt} failed (likely CDN hang), retrying after 5s..."
            sleep 5
          done

      - name: Playwright のシステム依存パッケージをインストール
        # Chromium 動作に必要な OS 共有ライブラリ (libgbm, libnss3, libxkbcommon0 等) と
        # 日本語フォント (fonts-ipafont-gothic 等) を apt 経由でインストール。
        # `install-deps` は軽量で、--with-deps と違いハング報告は確認されていない。
        # ubuntu-latest はパスワードレス sudo が使えるため追加設定不要。
        run: npx playwright install-deps chromium

      - name: E2E テストを実行
        # 設定ファイルがリポジトリルートではなく tests/ 配下にあるため
        # --config フラグで明示的にパスを渡す。
        # webServer は playwright.config.ts 内で http-server が自動起動される構成。
        # (reuseExistingServer: !process.env.CI のため、CI では毎回新規起動される)
        run: npx playwright test --config tests/playwright.config.ts

      - name: テスト失敗時に Playwright レポートと実行成果物をアップロード
        # if: failure() で失敗時のみアップロード (合格時は Artifact 容量を節約)。
        # 出力先は playwright.config.ts の場所基準で tests/ 配下に生成される。
        # - tests/playwright-report/  : HTML レポート
        # - tests/test-results/        : スクリーンショット / 動画 / トレース (失敗ケース分のみ)
        # retention-days: 7  : 失敗調査は直近のランで行うため7日で十分。
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            tests/playwright-report/
            tests/test-results/
          retention-days: 7
          if-no-files-found: warn
