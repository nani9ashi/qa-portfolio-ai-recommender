name: AI Quality Tests

# 手動実行のみ (Claude API のコスト発生のため)
# Phase 2 では判定 AI (Sonnet 4.6) も呼ぶためコスト増。
# GitHub Actions UI の "Run workflow" ボタンから起動。
on:
  workflow_dispatch:
    inputs:
      consistency_runs:
        description: "一貫性テストの呼び出し回数 (デフォルト 10、CIではコスト節約で短縮可)"
        required: false
        default: "10"

jobs:
  ai-quality-tests:
    name: AI 出力品質テスト (pytest + 実 Claude API + LLM-as-a-judge)
    runs-on: ubuntu-latest
    # Phase 2 で LLM judge 呼び出しが追加されたためタイムアウトを延長
    # (バックエンド呼び出し + Sonnet 4.6 判定 + 一貫性10x3 + 全テスト実行)
    timeout-minutes: 45

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tests/ai-quality/requirements.txt

      - name: Node 依存パッケージをインストール
        run: npm ci

      - name: Python 依存パッケージをインストール
        # Phase 2 で anthropic SDK が追加されている (LLM judge 呼び出し用)
        run: pip install -r tests/ai-quality/requirements.txt

      - name: バックエンドをバックグラウンド起動
        # GitHub Secrets から ANTHROPIC_API_KEY を注入
        # backend (Haiku 4.5 で推薦理由生成) と Phase 2 LLM judge (Sonnet 4.6) の
        # 両方が同じ API キーを使用する
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p backend
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" > backend/.env
          nohup node backend/server.js > backend.log 2>&1 &
          echo $! > backend.pid

      - name: バックエンド起動を待機 (最大30秒)
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health | grep -q '"status":"ok"'; then
              echo "バックエンド起動確認 (${i}秒)"
              exit 0
            fi
            sleep 1
          done
          echo "バックエンド起動タイムアウト"
          cat backend.log
          exit 1

      - name: AI 品質テストを実行
        # CONSISTENCY_RUNS は workflow_dispatch の入力で制御可能
        # Phase 2 LLM judge も同じ ANTHROPIC_API_KEY を流用 (conftest.py で backend/.env からフォールバック取得)
        env:
          BACKEND_URL: http://localhost:3001
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONSISTENCY_RUNS: ${{ github.event.inputs.consistency_runs }}
        run: |
          pytest tests/ai-quality \
            --html=tests/ai-quality/results/last-run.html \
            --self-contained-html

      - name: 結果と LLM judge トレースを Artifact としてアップロード (常に)
        # Phase 2 で追加された llm_judge_traces/ も含める。
        # 失敗時のみではなく常にアップロード (合格時のメトリクスもポートフォリオ価値あり)。
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-quality-results
          path: |
            tests/ai-quality/results/
            backend.log
          retention-days: 30
          if-no-files-found: warn

      - name: バックエンドを停止
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) 2>/dev/null || true
          fi
