[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# テストID で個別実行できるようにマーカーを定義
markers =
    accuracy: AI-A-* 正確性テスト
    consistency: AI-C-* 一貫性テスト (10回連続呼び出し、実行時間長め)
    safety: AI-S-* 安全性テスト
    quality: AI-Q-* 品質テスト
    slow: 長時間実行テスト

# レポート出力先 (helpers/reporters.py が動的にディレクトリ生成)
addopts = -v --tb=short
